<!DOCTYPE html>
<html>
<head>
    <title>Breed Detection Result</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            text-align:center;
            padding:40px;
        }

        .result-card{
            background:white;
            padding:30px;
            border-radius:10px;
            width:400px;
            margin:auto;
            box-shadow:0px 4px 15px rgba(0,0,0,0.1);
        }

        img{
            width:250px;
            border-radius:10px;
            margin-top:15px;
        }

        h2{
            color:#333;
        }

        .breed{
            font-size:22px;
            color:#4CAF50;
            font-weight:bold;
            margin-top:10px;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:#2196F3;
            color:white;
            text-decoration:none;
            border-radius:6px;
        }

        .btn:hover{
            background:#1976D2;
        }

    </style>
</head>

<body>

<div class="result-card">

    <h2>Breed Detection Result</h2>

    <p>Your uploaded image:</p>

    <img src="{{ image_path }}" alt="Uploaded Animal">

    <p class="breed">Predicted Breed: {{ breed }}</p>

    <a href="/breed_detector" class="btn">Try Another Image</a>

</div>

</body>
</html>
