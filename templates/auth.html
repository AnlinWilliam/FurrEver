<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login / Sign Up</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4f4f4;
}

/* Main Card */
.container{
width:750px;
height:420px;
background:white;
display:flex;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* LEFT SIDE (FORM) */
.form-section{
width:50%;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}



/* buttons */
.top-buttons{
display:flex;
flex-direction:column;  
gap:10px;
margin-bottom:20px;
}

.top-buttons button{
flex:1;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:14px;
transition:.3s;
}

.login-btn{
background:#ddd;
}

.signup-btn{
background:#ff7a00;
color:white;
}

.top-buttons button:hover{
opacity:0.9;
}

/* form */
form{
display:none;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

.submit-btn{
width:100%;
padding:12px;
border:none;
border-radius:5px;
background:#ff7a00;
color:white;
font-size:15px;
margin-top:10px;
cursor:pointer;
}

.submit-btn:hover{
opacity:.9;
}

/* RIGHT SIDE PANEL */
.welcome-section{
width:50%;
background:linear-gradient(135deg,#ff7a00,#ff9a3d);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
position:relative;
overflow:hidden;
}

/* Circle base style */
.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.25);
animation: float 6s ease-in-out infinite;
}

/* Big circle */
.circle1{
width:220px;
height:220px;
top:-60px;
right:-60px;
}

/* Medium circle */
.circle2{
width:120px;
height:120px;
bottom:40px;
right:60px;
animation-delay:2s;
}

/* Small circle */
.circle3{
width:60px;
height:60px;
bottom:120px;
right:200px;
animation-delay:4s;
}

/* Floating animation */
@keyframes float{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-15px);
}
100%{
transform:translateY(0px);
}
}

.welcome-section h1{
font-size:32px;
margin-bottom:10px;
}

.welcome-section p{
font-size:16px;
opacity:0.9;
}

.remember-row{
display:flex;
align-items:center;
justify-content:space-between;
margin-top:8px;
margin-bottom:10px;
font-size:14px;
color:#555;
}

.remember-row label{
display:flex;
align-items:center;
gap:6px;
cursor:pointer;
}

.remember-row input{
width:auto;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT FORM AREA -->
<div class="form-section">



<div class="top-buttons">
<button class="login-btn" onclick="showLoginForm()">Login</button>
<button class="signup-btn" onclick="showSignupForm()">Create Account</button>
</div>

<!-- Login Form -->
<form id="login-form" method="POST" action="{{ url_for('auth') }}">

<input type="hidden" name="action" value="login">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<div class="remember-row">
  <label>
    <input type="checkbox" name="remember">
    Remember me
  </label>
</div>

<button type="submit" class="submit-btn">Login</button>

</form>

<!-- Signup Form -->
<form id="signup-form" method="POST" action="{{ url_for('auth') }}">

<input type="hidden" name="action" value="signup">

<input type="text" name="name" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit" class="submit-btn">Create Account</button>

</form>

</div>


<!-- RIGHT SIDE PANEL -->
<div class="welcome-section">
 <div class="circle circle1"></div>
  <div class="circle circle2"></div>
  <div class="circle circle3"></div>
<h1>Hey</h1>
<h1>Welcome Back</h1>
<p>Login to continue your journey with us</p>
</div>

</div>

<script>

function showLoginForm(){
document.getElementById('login-form').style.display='block';
document.getElementById('signup-form').style.display='none';
}

function showSignupForm(){
document.getElementById('signup-form').style.display='block';
document.getElementById('login-form').style.display='none';
}

</script>

</body>
</html>
